services:
  mysql:
    image: mysql:8
    container_name: findit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: findit
    ports:
      - "3307:3306"
    volumes:
      - findit_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: findit-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - findit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  findit_mysql_data:
  findit_redis_data:
